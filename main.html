<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionBro | 影視元宇宙</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            scroll-behavior: smooth; font-family: 'Oswald', sans-serif; 
            overflow-x: hidden; width: 100%;
        }
        
        /* --- 1. 側邊選單：修正手機鎖死與電腦懸浮 --- */
        .drawer-menu {
            position: fixed; left: 0; top: 0; width: 0px; height: 100vh;
            overflow: hidden; transition: width 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center;
            backdrop-filter: blur(10px);
            background: repeating-linear-gradient(160deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 12px),
                        linear-gradient(120deg, rgba(15, 15, 15, 0.98) 0%, rgba(45, 45, 45, 0.85) 25%, rgba(10, 10, 10, 0.95) 50%, rgba(50, 50, 50, 0.8) 75%, rgba(5, 5, 5, 0.98) 100%);
            background-size: auto, 200% 200%;
            animation: silkShimmer 6s ease-in-out infinite alternate;
            box-shadow: inset -5px 0 20px rgba(0,0,0,0.8);
        }

        /* 電腦版：維持 10px 絲綢線懸浮 */
        @media (min-width: 769px) {
            .drawer-menu { width: 10px; }
            .drawer-menu:hover { width: 280px; }
            .drawer-menu:hover a { transform: translateX(0); opacity: 1; }
        }

        /* 手機版：靠 class 控制開關 */
        .drawer-menu.active { width: 280px !important; }
        .drawer-menu.active a { transform: translateX(0); opacity: 1; }

        .drawer-menu a {
            color: #eeeeee; text-decoration: none; font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; letter-spacing: 3px; margin: 25px auto;
            transition: all 0.4s ease; transform: translateX(-20px); opacity: 0; 
            text-align: center; width: 100%; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: block;
        }
        .drawer-menu a:hover { color: #ffffff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        .sub-text { font-family: 'Microsoft JhengHei', sans-serif; font-size: 0.9rem; color: #888; }

        /* --- 2. 手機版專用漢堡按鈕 --- */
        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 3000;
            width: 35px; height: 25px; cursor: pointer; display: none;
            flex-direction: column; justify-content: space-between;
        }
        .menu-btn div { width: 100%; height: 3px; background: #fff; transition: 0.3s; }

        /* --- 3. 內容區塊與打字機特效 --- */
        section {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px 20px; box-sizing: border-box;
        }

        #hero {
            background: linear-gradient(rgba(0,0,0,0.6), #000), 
                        url('https://images.unsplash.com/photo-1492691523569-fc010075d362?auto=format&fit=crop&q=80&w=2070');
            background-size: cover; background-position: center;
        }

        .logo { font-family: 'Noto Serif TC', serif; font-size: 5rem; letter-spacing: 15px; margin: 20px 0; text-align: center; }

        .typing-effect {
            font-size: 1.2rem; letter-spacing: 5px; color: #fff;
            white-space: nowrap; overflow: hidden; border-right: 3px solid #fff;
            animation: typing 2.5s steps(30, end), blink-caret 0.75s step-end infinite;
        }

        .grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; }
        .item { 
            width: 280px; height: 380px; background: #111; border: 1px solid #333;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            transition: 0.5s; cursor: pointer; box-sizing: border-box;
        }
        .item:hover { transform: scale(1.02); border-color: #fff; }

        .enter-link {
            margin-top: 50px; padding: 15px 40px; border: 1px solid #fff;
            text-decoration: none; color: #fff; transition: 0.3s;
        }
        .enter-link:hover { background: #fff; color: #000; }

        /* --- 4. 強力手機版 RWD 修正 --- */
        @media (max-width: 768px) {
            .menu-btn { display: flex; } /* 顯示按鈕 */
            .logo { font-size: 2.2rem !important; letter-spacing: 5px !important; line-height: 1.4; }
            .typing-effect { font-size: 0.9rem !important; letter-spacing: 2px !important; }
            .drawer-menu.active { width: 75vw !important; }
            
            #library h2 { font-size: 2.2rem !important; }
            .grid { flex-direction: column; align-items: center; gap: 20px; }
            .item { width: 90% !important; height: 250px !important; }
            
            .service-title { font-size: 1.8rem !important; }
            #services p { width: 100% !important; font-size: 0.9rem; }
        }

        /* 動畫庫 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink-caret { from, to { border-color: transparent; } 50% { border-color: #fff; } }
        @keyframes silkShimmer { 0% { background-position: 0% 0%, 0% 50%; } 100% { background-position: 0% 0%, 100% 50%; } }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="drawer-menu" id="drawer">
        <a href="#hero" onclick="closeMenu()">HOME<br><span class="sub-text">首頁</span></a>
        <a href="#library" onclick="closeMenu()">LIBRARY<br><span class="sub-text">剪輯圖書室</span></a>
        <a href="#services" onclick="closeMenu()">SERVICES<br><span class="sub-text">客製化服務</span></a>
    </div>

    <section id="hero">
        <div class="typing-container">
            <p class="typing-effect">ACTIONBRO PRESENTS</p>
        </div>
        <h1 class="logo reveal">影視元宇宙</h1>
        <p style="margin-top: 20px; color: #888;" class="reveal">SCROLL TO ENTER</p>
    </section>

    <section id="library">
        <h2 class="reveal" style="font-size: 3rem; margin-bottom: 50px;">剪輯圖書館</h2>
        <div class="grid reveal">
            <div class="item" onclick="location.href='library.html'">
                <h3>PR 專業教學</h3>
                <p class="sub-text">VIEW LIBRARY</p>
            </div>
            <div class="item" onclick="location.href='library.html'">
                <h3>達芬奇調色</h3>
                <p class="sub-text">VIEW LIBRARY</p>
            </div>
            <div class="item" onclick="location.href='library.html'">
                <h3>剪映快剪</h3>
                <p class="sub-text">VIEW LIBRARY</p>
            </div>
        </div>
    </section>

    <section id="services">
        <p style="color: #666;" class="reveal">CUSTOM PRODUCTION</p>
        <h2 class="service-title reveal">客製化影音工作室</h2>
        <p class="reveal" style="max-width: 600px; text-align: center; color: #888;">
            無論是長影音的深度敘事，還是短影音的流量爆發，我們為您提供最專業的視覺方案。
        </p>
        <a href="service.html" class="enter-link reveal">進入</a>
    </section>

    <script>
    // 開關選單
    function toggleMenu() {
        document.getElementById('drawer').classList.toggle('active');
    }
    // 點擊連結後自動關閉選單
    function closeMenu() {
        document.getElementById('drawer').classList.remove('active');
    }

    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            if (elementTop < windowHeight - 100) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
    reveal();
    </script>
</body>
</html>
