<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionBro | 影視元宇宙</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            scroll-behavior: smooth; font-family: 'Oswald', sans-serif; 
            overflow-x: hidden; width: 100%;
        }

        /* --- 側邊選單：基礎設定 --- */
        .drawer-menu {
            position: fixed; left: 0; top: 0; width: 0; height: 100vh;
            overflow: hidden; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center;
            backdrop-filter: blur(10px);
            background: linear-gradient(120deg, rgba(15, 15, 15, 0.98), rgba(5, 5, 5, 0.98));
            box-shadow: 5px 0 30px rgba(0,0,0,1);
        }

        /* 電腦版：懸浮展開 (寬度大於 768px 時生效) */
        @media (min-width: 769px) {
            body { padding-left: 10px; }
            .drawer-menu { width: 10px; }
            .drawer-menu:hover { width: 280px; }
            .drawer-menu:hover a { opacity: 1; transform: translateX(0); }
        }

        /* 手機與電腦共用的 Active 狀態 (靠 JS 切換) */
        .drawer-menu.active { width: 280px; }
        .drawer-menu.active a { opacity: 1; transform: translateX(0); }

        .drawer-menu a {
            color: #eeeeee; text-decoration: none; font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; letter-spacing: 3px; margin: 25px auto;
            transition: 0.4s; transform: translateX(-20px); opacity: 0; 
            text-align: center; width: 100%;
        }
        .drawer-menu a:hover { color: #fff; text-shadow: 0 0 15px #fff; }

        /* --- 手機版漢堡按鈕 --- */
        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 3000;
            width: 35px; height: 25px; cursor: pointer; display: none;
            flex-direction: column; justify-content: space-between;
        }
        .menu-btn div { width: 100%; height: 3px; background: #fff; transition: 0.3s; }

        @media (max-width: 768px) {
            .menu-btn { display: flex; } /* 手機才顯示按鈕 */
            .logo { font-size: 2.2rem !important; letter-spacing: 5px !important; }
            .drawer-menu.active { width: 75vw; } /* 手機展開佔 75% */
            section { height: auto !important; min-height: 100vh; padding: 80px 20px !important; }
            .grid { flex-direction: column !important; }
            .item { width: 100% !important; height: 250px !important; margin-bottom: 20px; }
        }

        /* --- 其他內容樣式 --- */
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #hero { background: linear-gradient(rgba(0,0,0,0.6), #000), url('https://images.unsplash.com/photo-1492691523569-fc010075d362?q=80&w=2070'); background-size: cover; background-position: center; }
        .logo { font-size: 5rem; letter-spacing: 15px; }
        .grid { display: flex; gap: 30px; }
        .item { width: 250px; height: 350px; background: #111; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; transition: 0.5s; cursor: pointer; }
        .item:hover { border-color: #fff; transform: scale(1.05); }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .sub-text { font-family: 'sans-serif'; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="drawer-menu" id="drawer">
        <a href="#hero" onclick="toggleMenu()">HOME<br><span class="sub-text">首頁</span></a>
        <a href="#library" onclick="toggleMenu()">LIBRARY<br><span class="sub-text">剪輯圖書室</span></a>
        <a href="#services" onclick="toggleMenu()">SERVICES<br><span class="sub-text">客製化服務</span></a>
    </div>

    <section id="hero">
        <h1 class="logo reveal">影視元宇宙</h1>
        <p class="reveal" style="color:#888">SCROLL TO ENTER</p>
    </section>

    <section id="library">
        <h2 class="reveal" style="font-size: 2.5rem; margin-bottom: 40px;">剪輯圖書館</h2>
        <div class="grid reveal">
            <div class="item" onclick="location.href='library.html'"><h3>PR 專業教學</h3></div>
            <div class="item" onclick="location.href='library.html'"><h3>達芬奇調色</h3></div>
        </div>
    </section>

    <script>
        // 選單開關
        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('active');
        }

        // 滾動動畫
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                var windowHeight = window.innerHeight;
                var elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) { el.classList.add("active"); }
            });
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>

</body>
</html>
