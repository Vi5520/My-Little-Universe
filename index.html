<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my universe | vivi </title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           1. 基礎樣式 & 深邃星空背景
           ============================================ */
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            scroll-behavior: smooth; font-family: 'Oswald', sans-serif; 
            overflow: hidden; width: 100%; height: 100%;
        }
        
        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            transition: opacity 1.2s ease, visibility 1.2s;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1128 0%, #000 100%);
        }

        #stars, #stars2 {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: transparent; z-index: 1;
        }

        #stars { width: 1px; height: 1px; animation: starBlink 50s linear infinite; }
        #stars2 { width: 2px; height: 2px; border-radius: 50%; animation: starBlink 100s linear infinite; }

        @keyframes starBlink { from { opacity: 1; } to { opacity: 0.5; } }

        /* --- 動態流星 --- */
        .shooting-star {
            position: absolute; left: 50%; top: 50%;
            height: 2px; background: linear-gradient(-45deg, #fff, rgba(0, 0, 255, 0));
            border-radius: 999px; filter: drop-shadow(0 0 6px #fff);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
            z-index: 2; opacity: 0;
        }

        .shooting-star:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 30%; left: 70%; animation-delay: 1.5s; }
        .shooting-star:nth-child(3) { top: 50%; left: 20%; animation-delay: 3s; }
        .shooting-star:nth-child(4) { top: 70%; left: 80%; animation-delay: 4s; }

        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; }
            100% { transform: translateX(400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }

        /* ============================================
           2. LOGO 傳送門 (中上部)
           ============================================ */
        .logo-container {
            position: absolute; top: 15%; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        .logo-circle {
            width: 170px; height: 170px; border-radius: 50%;
            border: 3px solid #007bff;
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.7), inset 0 0 20px rgba(0, 123, 255, 0.4);
            display: flex; justify-content: center; align-items: center;
            background: #000;
            overflow: hidden;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .logo-circle img {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(1.1) contrast(1.1);
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); }
        }

        /* ============================================
           3. 進入按鈕 (底部紅框位置)
           ============================================ */
        .entry-btn {
            position: absolute;
            bottom: 10%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 65px; 
            
            font-family: 'Noto Serif TC', serif; 
            font-weight: 700;
            font-size: 1.5rem; 
            color: #fff;
            letter-spacing: 15px; 
            text-indent: 15px;    
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); 
            
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #007bff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.5);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .entry-btn:hover {
            background: #007bff;
            box-shadow: 0 0 60px rgba(0, 123, 255, 1);
            color: #fff;
            letter-spacing: 20px; 
            text-indent: 20px;
            transform: translateX(-50%) scale(1.08); 
        }

        #entry-overlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        /* ============================================
           4. 手機版 RWD 適配
           ============================================ */
        @media (max-width: 768px) {
            .logo-portal { width: 140px; height: 140px; }
            .entry-btn { font-size: 0.8rem; padding: 7px 20px; letter-spacing: 4px; text-indent: 4px; bottom: 12%; }
        }
    </style>
</head>
<body>

    <div id="entry-overlay">
        <div id="stars"></div>
        <div id="stars2"></div>
        
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>

        <div class="logo-container">
            <div class="logo-circle">
                <img src="my-photo.jpg" alt="Vivi Photo">
            </div>
        </div>
        
        <button class="entry-btn" onclick="startExperience()">我的小宇宙</button>
    </div>

    <script>
        // 🔥 修改這裡：加入跳轉頁面的邏輯
        function startExperience() {
            // 1. 先讓遮罩執行淡出動畫
            document.getElementById('entry-overlay').classList.add('fade-out');
            
            // 2. 設定計時器，等待動畫執行 1.2 秒後，跳轉到你的主頁面
            setTimeout(() => {
                // 👇 請將 'main.html' 換成你真正的主頁檔案名稱或網址 👇
                window.location.href = 'main.html'; 
            }, 1200);
        }

        // 星星生成邏輯 (保持不變)
        function createStars(id, count) {
            const starContainer = document.getElementById(id);
            let shadows = "";
            for (let i = 0; i < count; i++) {
                shadows += `${Math.random() * 2000}px ${Math.random() * 2000}px #FFF, `;
            }
            starContainer.style.boxShadow = shadows.slice(0, -2);
        }

        window.onload = function() {
            createStars('stars', 700);
            createStars('stars2', 200);
        };
    </script>
</body>
</html>
